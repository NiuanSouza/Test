spring.application.name=SIVA

# Conex„o com o Banco de Dados
# Tenta ler as vari·veis de ambiente (Render/Railway). Se n„o encontrar, usa o Docker local na porta 3307.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/ipem_db?createDatabaseIfNotExist=true&connectTimeout=30000}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# ConfiguraÁıes do Flyway e JPA
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SeguranÁa
api.security.token.secret=${JWT_SECRET:3f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0}