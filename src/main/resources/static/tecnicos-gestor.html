<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Técnicos</title>
    <link rel="stylesheet" href="css/tecnicos.css" />
  </head>

  <body class="pagina-tecnicos">
    <div class="top-bar">
      <div class="left">
        <button id="btnmenu">
          <img src="img/menu.png" alt="icone menu" />
        </button>
        <span class="titulo" id="boas-vindas-titulo">Bem vindo!</span>
      </div>
      <div class="logout">
        <button id="btnlogout" onclick="btnlogout()">
          <img src="img/logout.png" alt="icone logout" />
        </button>
      </div>
    </div>

    <main class="tecnicos-container">
      <section class="painel-tecnicos">
        <div class="painel-tecnicos-topo">
          <div>
            <h1>Perfis de técnicos</h1>
          </div>
          <div class="tecnicos-actions">
            <button
              type="button"
              class="btn-acao-filtrar"
              onclick="aplicarFiltroTecnicos()"
            >
              Buscar
            </button>
            <button
              type="button"
              class="btn-limpar-filtro"
              onclick="limparFiltroTecnicos()"
            >
              Limpar
            </button>
          </div>
        </div>

        <section class="tecnicos-filtro-panel">
          <div class="filtro-busca">
            <input
              id="filtroBuscaTecnico"
              type="text"
              class="filtro-busca-input"
              placeholder="Digite nome ou matrícula ou e-mail"
            />
          </div>
        </section>

        <div class="tecnicos-table-wrapper">
          <table class="tecnicos-table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Matrícula</th>
                <th>E-mail</th>
                <th>Setor</th>
                <th>Perfil</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tecnicosTabelaCorpo"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="popupEditarTecnico" class="sobreposicao">
      <div class="popup-card">
        <button class="popup-close" onclick="fecharPopupEditarTecnico()">
          ×
        </button>
        <h2 class="popup-titulo">Editar técnico</h2>
        <div class="popup-conteudo">
          <div class="group">
            <input id="editarNome" type="text" class="input" required />
            <span class="bar"></span>
            <label>Nome</label>
          </div>
          <div class="group">
            <input id="editarEmail" type="email" class="input" required />
            <span class="bar"></span>
            <label>E-mail</label>
          </div>
          <div class="group">
            <input id="editarMatricula" type="text" class="input" required />
            <span class="bar"></span>
            <label>Matrícula</label>
          </div>
          <div class="group">
            <input id="editarTelefone" type="text" class="input" />
            <span class="bar"></span>
            <label>Telefone</label>
          </div>
          <div class="group">
            <input id="editarSetor" type="text" class="input" />
            <span class="bar"></span>
            <label>Setor</label>
          </div>
          <div class="group">
            <input id="editarPerfil" type="text" class="input" />
            <span class="bar"></span>
            <label>Perfil</label>
          </div>
          <div class="group select-group">
            <label>Status</label>
            <select id="editarStatus">
              <option value="Ativo">Ativo</option>
              <option value="Inativo">Inativo</option>
              <option value="Suspenso">Suspenso</option>
            </select>
          </div>
        </div>
        <div class="popup-actions">
          <button
            type="button"
            class="btn-acao-filtrar"
            onclick="salvarAlteracoesTecnico()"
          >
            Salvar alterações
          </button>
          <button
            type="button"
            class="btn-limpar-filtro"
            onclick="fecharPopupEditarTecnico()"
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <div id="overlayBlurSidebar" class="overlay-blur-sidebar"></div>

    <div id="sidebar" class="sidebar">
      <button id="btnx" class="close-btn">×</button>
      <a href="telainicial-gestor.html">TELA INICIAL</a>
      <a href="relatorios.html">RELATÓRIOS</a>
      <a href="tecnicos-gestor.html" class="active">TÉCNICOS</a>
      <a href="historicochamados.html">HISTÓRICO DE CHAMADOS</a>
      <a href="cadastrousuarios.html">CADASTRO DE USUÁRIOS</a>
      <a href="cadastroveiculos.html">CADASTRO DE VEÍCULOS</a>
      <a href="#">DÚVIDAS</a>
      <a href="configuracoes-gestor.html">CONFIGURAÇÕES</a>
    </div>

    <div id="toast-aviso" class="toast-hidden">Preencha todos os campos!</div>
    <div id="toast-aviso1" class="toast-hidden1">Preencha todos os campos!</div>

    <script src="js/basic.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tecnicos.js"></script>
  </body>
</html>
